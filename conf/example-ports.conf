# =============================================================================
# Example batch configuration: example-ports.conf
# =============================================================================
# Used by:  socat_manager.sh batch --config conf/example-ports.conf
#
# Format rules (enforced by the batch --config parser):
#   - One port per line.
#   - Everything from a '#' to the end of the line is a comment and ignored.
#   - Blank lines and surrounding whitespace are ignored.
#   - Each entry must be a single port in the range 1-65535. Port RANGES are
#     not expressed here; use the --range flag for those (for example
#     `batch --range 8000-8010`). A config file lists individual ports only.
#   - Duplicate ports are de-duplicated automatically (first occurrence wins).
#   - Ports below 1024 are privileged and require root/sudo to bind.
#
# The protocol, capture, watchdog, access-control, and dual-stack options are
# supplied on the command line and apply to every port in the file, e.g.:
#   socat_manager.sh batch --config conf/example-ports.conf --proto tcp4 --capture
# =============================================================================

# --- Web services ---
8080          # HTTP alternate
8443          # HTTPS alternate

# --- Application services ---
9090          # metrics / admin
9200          # search API

# --- Message brokers ---
5672          # AMQP
6379          # cache

# A port can be commented out to disable it without deleting the line:
# 15672       # broker management UI (disabled)

# Trailing and inline whitespace is fine; this line still resolves to 7777:
    7777      # scratch / testing
